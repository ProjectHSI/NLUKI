name: Makefile CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64]

    steps:
    - uses: cachix/install-nix-action@v31
      with:
        nix_path: nixpkgs=channel:nixos-26.05

    - uses: actions/checkout@v7
      name: Recursive Checkout
      with:
        submodules: 'recursive'

    - name: Download GCC Dependencies
      if: steps.cache-dependencies.outputs.cache-hit != 'true'
      run: cd Submodules/gcc; ./contrib/download_prerequisites --isl

    - name: Download Other Dependencies
      if: steps.cache-dependencies.outputs.cache-hit != 'true'
      run: nix-shell --pure --run "make -L -j3 -f Host.mak nluki-host-extra NLUKI_TARGET_ARCH=${{ matrix.arch }}"

    - name: Cache Host Tools
      id: cache-host-tools
      uses: actions/cache/restore@v6
      with:
        path: |
          Build/Host
        key: ${{ runner.os }}-host-tools-cache

    - name: Make Host Tools
      run: nix-shell --pure --run "make -L -j3 nluki-host NLUKI_TARGET_ARCH=${{ matrix.arch }}"
    
    - name: Save Host Tools
      id: save-host-tools
      uses: actions/cache/save@v6
      with:
        path: |
          Build/Host
        key: ${{ runner.os }}-host-tools-cache

    - name: Cache CC Tools
      id: cache-cc-tools
      uses: actions/cache/restore@v6
      with:
        path: |
          Build/${{ matrix.arch }}
        key: ${{ runner.os }}-${{ matrix.arch }}-cc-tools-cache

    - name: Make CC Tools
      run: nix-shell --pure --run "make -L -j3 nluki-cc NLUKI_TARGET_ARCH=${{ matrix.arch }}"

    - name: Save CC Tools
      id: save-cc-tools
      uses: actions/cache/save@v6
      with:
        path: |
          Build/${{ matrix.arch }}
        key: ${{ runner.os }}-${{ matrix.arch }}-cc-tools-cache

    - name: Cache Build
      id: cache-build
      uses: actions/cache/restore@v6
      with:
        path: |
          Build/${{ matrix.arch }}
        key: ${{ runner.os }}-${{ matrix.arch }}-build-cache

    - name: Make
      run: nix-shell --pure --run "make -L -j3 NLUKI_TARGET_ARCH=${{ matrix.arch }}"
    
    - name: Save Build
      id: save-build
      uses: actions/cache/save@v6
      with:
        path: |
          Build/${{ matrix.arch }}
        key: ${{ runner.os }}-${{ matrix.arch }}-build-cache

    #- name: Run check
      #run: make check

    #- name: Run distcheck
      #run: make distcheck
